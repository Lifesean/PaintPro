<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PaintPro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <aside id="toolbar">
    <div class="tool-group">
      <h3>브러시</h3>
      <div class="tool-group" id="tool-buttons"></div>
    </div>
    <div class="tool-group">
      <h3>도형</h3>
      <div class="tool-group" id="shape-buttons"></div>
      <label><input type="checkbox" id="fillShape"> 채우기</label>
    </div>
    <div class="tool-group">
      <label>색상 <input type="color" id="colorPicker" value="#000000"></label>
      <label>굵기 <input type="range" id="sizeRange" min="1" max="50" value="4"></label>
    </div>
    <div class="tool-group">
      <h3>왜곡</h3>
      <label>강도 <input type="number" id="distortAmount" min="-100" max="100" value="20"></label>
      <button id="distortApplyBtn">전체 왜곡 적용</button>
      <p class="hint">'왜곡 브러시' 도구로 드래그하면 국소적으로도 왜곡할 수 있어요.</p>
    </div>
    <div class="tool-group">
      <button id="undoBtn">Undo</button>
      <button id="redoBtn">Redo</button>
      <button id="clearBtn">Clear</button>
      <button id="saveBtn">Save PNG</button>
    </div>
  </aside>
  <main id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </main>
</div>
<script src="script.js"></script>
</body>
</html>
